name: Build TopicInfoPatcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout TopicInfoPatcher
      uses: actions/checkout@v4
      with:
        path: TopicInfoPatcher

    - name: Checkout CommonLibF4 (alandtse - CMake support)
      uses: actions/checkout@v4
      with:
        repository: alandtse/CommonLibF4
        ref: master
        path: CommonLibF4

    - name: Patch Address Library flag for NG 1.11.191
      shell: pwsh
      run: |
        $file = "CommonLibF4/CommonLibF4/include/F4SE/Interfaces.h"
        $content = Get-Content $file -Raw
        # Change bit 1 (pre-NG) to bit 2 (NG 1.11.137+) for Address Library flag
        $content = $content -replace '1 << 1 is for address library for 1.10.980', '1 << 2 is for address library for 1.11.137'
        $content = $content -replace 'addressIndependence = 1u << 1;', 'addressIndependence = 1u << 2;'
        Set-Content $file $content -NoNewline
        Write-Host "Patched Address Library flag from bit 1 to bit 2 for NG support"

    - name: Setup vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.bat

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build -S TopicInfoPatcher `
          -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
          -DCOPY_BUILD=OFF `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      shell: pwsh
      run: cmake --build build --config $env:BUILD_TYPE

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: TopicInfoPatcher
        path: |
          build/${{ env.BUILD_TYPE }}/TopicInfoPatcher.dll
          TopicInfoPatcher/src/TopicInfoPatcher.psc
          TopicInfoPatcher/TopicInfoPatcher.pex
