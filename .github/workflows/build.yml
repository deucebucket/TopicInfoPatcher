name: Build TopicInfoPatcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout TopicInfoPatcher
      uses: actions/checkout@v4
      with:
        path: TopicInfoPatcher

    - name: Checkout CommonLibF4 (powerof3 - CMake + correct NG flags)
      uses: actions/checkout@v4
      with:
        repository: powerof3/CommonLibF4
        path: CommonLibF4

    - name: Setup vcpkg
      uses: friendlyanon/setup-vcpkg@v1
      with:
        committish: 943c5ef1c8f6b5e6ced092b242c8299caae2ff01

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build -S TopicInfoPatcher `
          -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
          -DCOPY_BUILD=OFF `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      shell: pwsh
      run: cmake --build build --config $env:BUILD_TYPE

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: TopicInfoPatcher
        path: |
          build/${{ env.BUILD_TYPE }}/TopicInfoPatcher.dll
          TopicInfoPatcher/src/TopicInfoPatcher.psc
          TopicInfoPatcher/TopicInfoPatcher.pex
