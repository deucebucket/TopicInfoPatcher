name: Build TopicInfoPatcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout TopicInfoPatcher
      uses: actions/checkout@v4
      with:
        path: TopicInfoPatcher

    - name: Checkout CommonLibF4 (powerof3 - CMake + correct NG flags)
      uses: actions/checkout@v4
      with:
        repository: powerof3/CommonLibF4
        path: CommonLibF4

    - name: Create vcpkg binary cache dir
      shell: pwsh
      run: New-Item -ItemType Directory -Force "${{ github.workspace }}/vcpkg-cache"

    - name: Setup vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.bat

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build -S TopicInfoPatcher `
          -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
          -DCOPY_BUILD=OFF `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      shell: pwsh
      run: cmake --build build --config $env:BUILD_TYPE

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: TopicInfoPatcher
        path: |
          build/${{ env.BUILD_TYPE }}/TopicInfoPatcher.dll
          TopicInfoPatcher/src/TopicInfoPatcher.psc
          TopicInfoPatcher/TopicInfoPatcher.pex
